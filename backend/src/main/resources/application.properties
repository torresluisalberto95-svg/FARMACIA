spring.application.name=farmacia-backend

# Database — Railway inyecta PGHOST/PGPORT/PGUSER/PGPASSWORD/PGDATABASE
#             automaticamente al vincular el servicio PostgreSQL al backend
#             Localmente usa una BD PostgreSQL con los valores por defecto
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:farmacia}${DB_PARAMS:}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Inicializar esquema desde schema.sql al arrancar
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# JWT — en Render se genera automáticamente; localmente usa el valor por defecto
app.jwt.secret=${JWT_SECRET:local-dev-secret-minimo-32-caracteres-cambiar-en-prod}
app.jwt.expiration-ms=86400000

# Admin inicial (se crea si no existe en DB)
app.admin.email=${ADMIN_EMAIL:admin@mdfarmasalud.com}
app.admin.password=${ADMIN_PASSWORD:Admin123!}
app.admin.fullname=${ADMIN_FULLNAME:Administrador}

# CORS — orígenes permitidos separados por coma
app.cors.allowed-origins=${CORS_ORIGINS:https://farmasaludmd2026.vercel.app,http://localhost:5173,http://localhost:4173}

# Puerto
server.port=${PORT:8088}
